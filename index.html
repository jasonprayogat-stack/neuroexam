<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1420" />
  <title>NeuroExam — Pocket Guide</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header>
    <div class="title">
      <h1>NeuroExam</h1><span>Pocket Guide</span>
    </div>
    <input id="search" type="search" placeholder="Search tests, signs, diseases…" />
    <nav id="tabs"></nav>
  </header>

  <main>
    <div id="grid"></div>
  </main>

  <p class="disclaimer">
    Study aid only. Content drafted from Bates' Guide to Physical Examination and History
    Taking — verify against the current edition before clinical use. The 3D figures are
    stylized teaching models, not anatomically exact.
  </p>

  <!-- 3D modal -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-head">
        <h2 id="modal-title">Test</h2>
        <button id="modal-close" aria-label="Close">×</button>
      </div>
      <div id="stage"></div>
      <p id="modal-desc"></p>
      <p class="hint-rotate">Drag to rotate · pinch / scroll to zoom</p>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
